name: Deploy VitePress site to Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4

      - name: Checkout blog-content
        uses: actions/checkout@v4
        with:
          repository: xufanchn/blog-content
          path: blog-content

      - name: Sync posts from blog-content
        run: |
          mkdir -p posts
          rsync -a --delete blog-content/posts/ posts/
          rm -rf blog-content

          # Generate blog post list for index.md
          list=""
          for f in $(ls -t posts/*.md); do
            title=$(grep -m1 "^title:" "$f" | sed 's/^title: *//;s/^"//;s/"$//')
            date=$(grep -m1 "^date:" "$f" | sed 's/^date: *//')
            desc=$(grep -m1 "^description:" "$f" | sed 's/^description: *//;s/^"//;s/"$//')
            slug=$(basename "$f" .md)
            list="${list}### [${title}](/posts/${slug})\n\n"
            list="${list}*${date} · xufanchn*\n\n"
            list="${list}${desc}\n\n"
            list="${list}[阅读全文 →](/posts/${slug})\n\n---\n\n"
          done
          awk -v list="$list" '
            /<!-- AUTO_LIST_START -->/ { print; print ""; print list; in_list=1; next }
            /<!-- AUTO_LIST_END -->/   { in_list=0 }
            !in_list
          ' index.md > index.tmp && mv index.tmp index.md

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build VitePress
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
