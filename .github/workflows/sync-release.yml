name: Sync release info from webterm

on:
  repository_dispatch:
    types: [new-release]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest release from webterm
        id: release
        run: |
          RELEASE=$(curl -sL \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/xufanchn/webterm/releases/latest)
          echo "tag=$(echo "$RELEASE" | jq -r '.tag_name')" >> $GITHUB_OUTPUT
          echo "name=$(echo "$RELEASE" | jq -r '.name')" >> $GITHUB_OUTPUT
          echo "date=$(echo "$RELEASE" | jq -r '.published_at' | cut -dT -f1)" >> $GITHUB_OUTPUT
          echo "$RELEASE" | jq -r '.body' > /tmp/release-body.md

      - name: Check if version already in changelog
        id: check
        run: |
          if grep -q "${{ steps.release.outputs.tag }}" changelog.md; then
            echo "already exists, skipping"
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Update changelog
        if: steps.check.outputs.updated == 'true'
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          NAME="${{ steps.release.outputs.name }}"
          DATE="${{ steps.release.outputs.date }}"

          ENTRY="## $TAG ($DATE)

          $NAME

          $(cat /tmp/release-body.md)

          "

          awk -v entry="$ENTRY" '
            /<!-- RELEASES_START -->/ { print; print ""; print entry; next }
            { print }
          ' changelog.md > changelog.tmp && mv changelog.tmp changelog.md

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add changelog.md
          git commit -m "docs: sync ${{ steps.release.outputs.tag }} from webterm"
          git push
